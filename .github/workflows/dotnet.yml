name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.100
      - name: Restore
        run: dotnet restore pupdate.csproj
      - name: Build
        run: dotnet build pupdate.csproj --no-restore --configuration Release

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.100
      - name: Restore
        run: dotnet restore tests/pupdate.Tests/pupdate.Tests.csproj
      - name: Test
        run: |
          dotnet test tests/pupdate.Tests/pupdate.Tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults
      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: dotnet test results
          path: TestResults/test-results.trx
          reporter: dotnet-trx
          fail-on-error: false
      - name: Generate coverage summary
        if: success() || failure()
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            "-reports:TestResults/**/coverage.cobertura.xml" \
            "-targetdir:TestResults/coverage-report" \
            "-reporttypes:MarkdownSummaryGithub"
          if [ -f TestResults/coverage-report/SummaryGithub.md ]; then
            cat TestResults/coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
          fi

  build-legacy:
    name: Build (legacy net7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.100
      - name: Restore
        run: dotnet restore pupdate_legacy.csproj
      - name: Build
        run: dotnet build pupdate_legacy.csproj --no-restore --configuration Release
