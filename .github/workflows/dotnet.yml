name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.100
    - name: Restore dependencies
      run: dotnet restore pupdate.csproj
    - name: Build
      run: dotnet build pupdate.csproj --no-restore --configuration Release
    - name: Restore test dependencies
      run: dotnet restore tests/pupdate.Tests/pupdate.Tests.csproj
    - name: Test
      run: |
        dotnet test tests/pupdate.Tests/pupdate.Tests.csproj \
          --configuration Release \
          --logger "trx;LogFileName=test-results.trx" \
          --logger "GitHubActions" \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults
    - name: Publish test report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: dotnet test results
        path: TestResults/test-results.trx
        reporter: dotnet-trx
        fail-on-error: false
    - name: Generate coverage summary
      if: success() || failure()
      run: |
        dotnet tool install -g dotnet-reportgenerator-globaltool
        export PATH="$PATH:$HOME/.dotnet/tools"
        reportgenerator \
          "-reports:TestResults/**/coverage.cobertura.xml" \
          "-targetdir:TestResults/coverage-report" \
          "-reporttypes:MarkdownSummaryGithub"
        if [ -f TestResults/coverage-report/SummaryGithub.md ]; then
          cat TestResults/coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
        fi
    - name: Restore legacy dependencies
      run: dotnet restore pupdate_legacy.csproj
    - name: Build legacy
      run: dotnet build pupdate_legacy.csproj --no-restore --configuration Release
